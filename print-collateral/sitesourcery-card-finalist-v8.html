<style>

*{box-sizing:border-box;margin:0}html,body{background:#d8d4cf;color:var(--ink);font-family:var(--sans)}body{padding:28px;display:grid;gap:28px;justify-content:center}.page{position:relative;width:3.75in;height:2.25in;overflow:hidden;box-shadow:0 20px 60px rgba(20,15,22,.27)}.safe{position:absolute;inset:.25in;z-index:4}.label{margin-bottom:-18px;color:#6e6870;font:700 11px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase}
.front{background:radial-gradient(circle at 78% 48%,#171021 0,transparent 42%),var(--black);color:#fbf7ff}.front::before{content:"";position:absolute;inset:.13in;border:1px solid rgba(225,204,241,.16);z-index:3}.wand-medallion{position:absolute;right:.19in;top:.38in;width:1.38in;height:1.38in;border-radius:50%;z-index:1;background:conic-gradient(from 215deg,#402b91,#7047ee 18%,#b05de5 34%,#f08cb6 46%,#ffd58a 51%,#e15b8c 60%,#7047ee 78%,#30206e);box-shadow:0 .11in .24in rgba(0,0,0,.55),0 0 .24in rgba(112,71,238,.28),inset .035in .035in .06in rgba(255,255,255,.58),inset -.05in -.06in .08in rgba(26,8,55,.72)}.wand-medallion::before{content:"";position:absolute;inset:.15in;border-radius:50%;background:radial-gradient(circle at 38% 28%,#37224f 0,#171020 36%,#09070c 76%);box-shadow:inset .035in .04in .07in rgba(255,255,255,.12),inset -.04in -.05in .08in #020103,0 0 0 1px rgba(255,255,255,.2)}.wand-medallion::after{content:"";position:absolute;left:.2in;right:.2in;top:.11in;height:.28in;border-radius:50%;background:linear-gradient(rgba(255,255,255,.55),rgba(255,255,255,0));filter:blur(.025in);opacity:.55}.wand-art{position:absolute;inset:.22in;z-index:2;width:.94in;height:.94in;filter:drop-shadow(.035in .055in .035in rgba(0,0,0,.85)) drop-shadow(0 0 .07in rgba(184,130,255,.55))}.front .safe{display:grid;grid-template-columns:.18in 1fr;gap:.2in}.spine{border-right:1px solid rgba(225,204,241,.2);display:flex;align-items:end}.spine span{writing-mode:vertical-rl;transform:rotate(180deg);font:700 4.6pt/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:#9489a0}.content{display:flex;flex-direction:column;justify-content:space-between;gap:.14in}.brand{display:flex;align-items:center;gap:.055in;font:800 5.7pt/1 var(--mono);letter-spacing:.16em;text-transform:uppercase}.brand-star{width:.12in;height:.12in}.front h1{position:relative;z-index:2;font:400 17.4pt/1.08 var(--serif);letter-spacing:-.01em;max-width:1.62in;text-shadow:0 2px 8px #09070c}.front h1 em{display:bl .back{background:var(--white)}.back::before{content:"";position:absolute;left:0;top:0;bottom:0;width:.055in;background:linear-gradient(var(--violet),var(--rose))}.back .safe{left:.32in;display:grid;grid-template-columns:1.48in 1.42in;gap:.16in;align-items:stretch}.person{display:flex;flex-direction:column;justify-content:center}.person .brandline{display:flex;align-items:center;gap:.06in;margin-bottom:.14in;color:#655d68;font:750 5.2pt/1 var(--mono);letter-spacing:.13em;text-transform:uppercase}.person .mini{width:.11in;height:.11in}.person h2{font:400 15.5pt/.95 var(--serif);letter-spacing:-.035em}.person .title{margin-top:.045in;color:#7556ce;font:700 5.7pt/1.2 var(--sans);letter-spacing:.03em}.details{display:grid;gap:.033in;margin-top:.15in;padding-top:.1in;border-top:1px solid #d8d3dc;color:#26212a;font:600 5.8pt/1.2 var(--mono)}.details span:first-child{font-weight:800}.qr{display:grid;place-content:center;text-align:center;border-left:1px solid #d8d3dc;padding-left:.12in}.qr img{display:block;width:1.25in;height:1.25in;background:#fff}.qr p{margin-top:.055in;color:#6d6570;font:800 4.9pt/1 var(--mono);letter-spacing:.13em;text-transform:uppercase}.footer-note{position:absolute;left:.32in;bottom:.13in;color:#8d8690;font:700 4.35pt/1 var(--mono);letter-spacing:.08em;text-transform:uppercase}
